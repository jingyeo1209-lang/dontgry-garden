<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>똔그리 가든</title>
    <meta name="description" content="다 같이 돼지런하게, 리치 투게더! 재테크·경제·투자 인사이트를 한곳에서.">
    <meta property="og:title" content="똔그리 가든">
    <meta property="og:description" content="다 같이 돼지런하게, 리치 투게더!">
    <meta property="og:image" content="garden-map.png">
    <meta property="og:type" content="website">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        html {
            overflow-x: hidden;
            -webkit-text-size-adjust: 100%;
        }

        body {
            font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica,
                "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", sans-serif;
            background: #fff;
            color: #37352f;
            min-height: 100vh;
            width: 100%;
            max-width: 100%;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        img { max-width: 100%; height: auto; display: block; }

        .page {
            width: 100%;
            max-width: 1100px;
            margin: 0 auto;
            padding: clamp(20px, 5vw, 48px) clamp(14px, 4vw, 40px) clamp(40px, 8vw, 80px);
        }

        .page-title {
            font-size: clamp(24px, 6vw, 40px);
            font-weight: 700;
            letter-spacing: -0.02em;
            line-height: 1.25;
            margin-bottom: 12px;
            overflow-wrap: anywhere;
            word-break: keep-all;
        }

        .page-title .emoji { margin-right: 8px; }

        .page-desc {
            color: #787774;
            font-size: clamp(13px, 3.5vw, 14px);
            margin-bottom: 20px;
            line-height: 1.5;
            overflow-wrap: anywhere;
            word-break: keep-all;
        }

        .hero {
            width: 100%;
            margin-bottom: clamp(20px, 4vw, 28px);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #e9e9e7;
            background: #f7f6f3;
            line-height: 0;
        }

        .hero img {
            width: 100%;
            max-width: 100%;
            height: auto;
            display: block;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
            width: 100%;
        }

        .card {
            display: flex;
            flex-direction: column;
            min-width: 0;
            max-width: 100%;
            text-decoration: none;
            color: inherit;
            background: #fff;
            border: 1px solid #e9e9e7;
            border-radius: 10px;
            overflow: hidden;
            transition: background 0.15s ease, box-shadow 0.15s ease;
        }

        .card:hover {
            background: #f7f6f3;
            box-shadow: 0 2px 8px rgba(15, 15, 15, 0.06);
        }

        .card-cover {
            aspect-ratio: 16 / 10;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            border-bottom: 1px solid #e9e9e7;
            flex-shrink: 0;
        }

        .card-cover.ttong { background: linear-gradient(145deg, #fff8e1, #ffe082); }
        .card-cover.pink { background: linear-gradient(145deg, #fce4ec, #f8bbd0); }
        .card-cover.sungree { background: linear-gradient(145deg, #e8f5e9, #a5d6a7); }
        .card-cover.oasis { background: linear-gradient(145deg, #f3e5f5, #ce93d8); }

        .card-body {
            padding: 8px 10px 10px;
            min-width: 0;
        }

        .card-title {
            font-size: 12px;
            font-weight: 500;
            line-height: 1.4;
            color: #37352f;
            overflow-wrap: anywhere;
            word-break: keep-all;
        }

        @media (min-width: 720px) {
            .gallery {
                grid-template-columns: repeat(4, minmax(0, 1fr));
                gap: 16px;
            }

            .card-cover { font-size: 44px; }
            .card-body { padding: 12px 14px 14px; }
            .card-title { font-size: 14px; line-height: 1.45; }
        }
    </style>
</head>
<body>
    <main class="page">
        <h1 class="page-title"><span class="emoji">🏡</span>똔그리 가든</h1>
        <p class="page-desc">다 같이 돼지런하게, 리치 투게더!</p>

        <div class="hero">
            <img src="garden-map.png" alt="똔그리 가든 — 돈을 키우는 돼지들의 정원" loading="eager">
        </div>

        <div class="gallery">
            <a href="ttong.html" class="card">
                <div class="card-cover ttong">🥕</div>
                <div class="card-body">
                    <div class="card-title">🥕 똔그리의 재테크 한 스푼</div>
                </div>
            </a>

            <a href="pink.html" class="card">
                <div class="card-cover pink">🐷</div>
                <div class="card-body">
                    <div class="card-title">🐷 연그리의 경제 한 스푼</div>
                </div>
            </a>

            <a href="magic-glasses.html" class="card">
                <div class="card-cover sungree">🕶️</div>
                <div class="card-body">
                    <div class="card-title">🕶️ 썬그리의 메타 안경</div>
                </div>
            </a>

            <a href="oasis.html" class="card">
                <div class="card-cover oasis">🏝️</div>
                <div class="card-body">
                    <div class="card-title">🏝️ 투자자의 오아시스</div>
                </div>
            </a>
        </div>
    </main>
</body>
</html>
