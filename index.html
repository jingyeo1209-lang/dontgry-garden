<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>똔그리 가든</title>
    <style>
        /* 화면 전체 초기화 */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        /* 그림 대문 카드 상자 */
        .garden-container {
            position: relative;
            width: 100%;
            max-width: 500px; /* 대문 그림이 너무 퍼지지 않게 모바일 크기로 딱 잡아줍니다 */
            border: 4px solid #1a1a1a;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 4px 4px 0px #000;
            background: #fff;
        }

        .garden-map-img {
            width: 100%;
            display: block;
        }
        
        /* 💡 투명 버튼 위치 조절용 스티커 */
        /* 나중에 빨간 상자를 보고 싶으시면 맨 끝 숫자 '0'을 '0.4'로 고쳐서 저장하시면 됩니다! */
        .map-link {
            position: absolute;
            background: rgba(255, 0, 0, 0); 
            cursor: pointer;
            text-indent: -9999px;
            border-radius: 8px;
            transition: background 0.1s;
        }
        .map-link:hover {
            background: rgba(255, 255, 255, 0.2);
            outline: 2px dashed #1a1a1a;
        }

        /* 📍 캐릭터별 투명 버튼 위치 (% 숫자는 나중에 그림에 맞게 화살표로 조절하세요!) */
        .link-ttong    { top: 10%; left: 10%; width: 35%; height: 35%; }   /* 똔그리 돼지 */
        .link-pink     { top: 10%; right: 10%; width: 35%; height: 35%; }  /* 분홍 돼지 */
        .link-sungree  { bottom: 10%; left: 10%; width: 35%; height: 35%; } /* 선그리 돼지 */
        .link-wisdom   { bottom: 10%; right: 10%; width: 35%; height: 35%; } /* 지혜의 샘 */
    </style>
</head>
<body>

    <div class="garden-container">
        <img src="garden-map.png" class="garden-map-img" alt="똔그리가든 지도">

        <a href="ttong.html" class="map-link link-ttong">똔그리 돼지 페이지로 이동</a>
        <a href="pink.html" class="map-link link-pink">분홍 돼지 페이지로 이동</a>
        <a href="magic-glasses.html" class="map-link link-sungree">선그리 돼지 페이지로 이동</a>
        <a href="wisdom.html" class="map-link link-wisdom">지혜의 샘 페이지로 이동</a>
    </div>

</body>
</html>
