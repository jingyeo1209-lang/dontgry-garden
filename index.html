<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>똔그리 가든</title>
    <link href="https://fonts.googleapis.com/css2?family=DungGeunMo&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-red: #ffebee;
            --bg-yellow: #fffde7;
            --bg-green: #e8f5e9;
            --bg-purple: #f3e5f5;
        }

        /* 전체 화면 초기화 */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'DungGeunMo', sans-serif;
            background: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        /* 대문 전체 컨테이너 */
        .garden-container {
            width: 100%;
            max-width: 500px;
            position: relative;
        }

        /* 🖥️ PC용 스타일: 통그림 대문 */
        .pc-map-view {
            display: block;
            position: relative;
            width: 100%;
            border: 4px solid #1a1a1a;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 4px 4px 0px #000;
            background: #fff;
        }
        .garden-map-img { width: 100%; display: block; }
        
        .map-link {
            position: absolute; 
            background: rgba(255, 0, 0, 0); 
            cursor: pointer; 
            text-indent: -9999px; 
            border-radius: 8px; 
            transition: background 0.1s;
        }
        .map-link:hover { background: rgba(255, 255, 255, 0.2); outline: 2px dashed #1a1a1a; }
        
        /* 📍 PC 그림 위 캐릭터별 절대 좌표 */
        .link-ttong    { top: 10%; left: 10%; width: 35%; height: 35%; }
        .link-pink     { top: 10%; right: 10%; width: 35%; height: 35%; }
        .link-sungree  { bottom: 10%; left: 10%; width: 35%; height: 35%; }
        .link-oasis    { bottom: 10%; right: 10%; width: 35%; height: 35%; }

        /* 📱 모바일용 스타일: 2x2 아이콘 그리드 대문 (기본 숨김) */
        .mobile-grid-view { display: none; }

        /* 🎛️ 모바일 반응형 스위치 (화면 크기가 600px 이하일 때 가동) */
        @media (max-width: 600px) {
            .pc-map-view { display: none; }
            
            .mobile-grid-view {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 15px;
                width: 100%;
            }

            .mobile-grid-btn {
                padding: 30px 10px;
                font-size: 13px;
                line-height: 1.4;
                border: 3px solid #1a1a1a;
                border-radius: 12px;
                box-shadow: 4px 4px 0px #000;
                text-align: center;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 12px;
                text-decoration: none;
                color: #1a1a1a;
                font-weight: bold;
                transition: all 0.1s;
            }
            .mobile-grid-btn:active {
                transform: translate(2px, 2px);
                box-shadow: 1px 1px 0px #000;
            }
            .mobile-emoji { font-size: 36px; display: block; }
        }
    </style>
</head>
<body>

    <div class="garden-container">
        
        <div class="pc-map-view">
            <img src="garden-map.png" class="garden-map-img" alt="똔그리가든 지도">
            <a href="ttong.html" class="map-link link-ttong">똔그리 돼지</a>
            <a href="pink.html" class="map-link link-pink">분홍 돼지</a>
            <a href="magic-glasses.html" class="map-link link-sungree">선그리 돼지</a>
            <a href="oasis.html" class="map-link link-oasis">투자자의 오아시스</a>
        </div>

        <div class="mobile-grid-view">
            <a href="ttong.html" class="mobile-grid-btn" style="background-color: var(--bg-yellow);">
                <span class="mobile-emoji">🐖</span>
                <span>똔그리의<br>재테크 한 스푼</span>
            </a>
            <a href="pink.html" class="mobile-grid-btn" style="background-color: var(--bg-red);">
                <span class="mobile-emoji">🐷</span>
                <span>분홍돼지의<br>경제 한 스푼</span>
            </a>
            <a href="magic-glasses.html" class="mobile-grid-btn" style="background-color: var(--bg-green);">
                <span class="mobile-emoji">🕶️</span>
                <span>선그리 돼지의<br>메타 안경</span>
            </a>
            <a href="oasis.html" class="mobile-grid-btn" style="background-color: var(--bg-purple);">
                <span class="mobile-emoji">🔮</span>
                <span>투자자의<br>오아시스</span>
            </a>
        </div>
        
    </div>

</body>
</html>
