<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>똔그리의 재테크 한 스푼</title>
    <meta name="description" content="돈을 더하고 불리고 잘 쓰는 실전 재테크 한 스푼. 똔그리 가든.">
    <meta property="og:title" content="똔그리의 재테크 한 스푼">
    <meta property="og:description" content="돈을 더하고 불리고 잘 쓰는 실전 재테크 한 스푼.">
    <meta property="og:image" content="garden-map.png">
    <meta property="og:type" content="website">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="gallery-list.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        html { overflow-x: hidden; -webkit-text-size-adjust: 100%; }

        body {
            font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica,
                "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", sans-serif;
            background: #fff;
            color: #37352f;
            min-height: 100vh;
            width: 100%;
            max-width: 100%;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        img { max-width: 100%; height: auto; display: block; }

        .page {
            width: 100%;
            max-width: 1100px;
            margin: 0 auto;
            padding: clamp(20px, 5vw, 32px) clamp(14px, 4vw, 40px) clamp(40px, 8vw, 60px);
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            color: #787774;
            text-decoration: none;
            font-size: 14px;
            padding: 4px 8px;
            margin: 0 0 16px -8px;
            border-radius: 6px;
            transition: background 0.15s ease;
        }

        .back-link:hover { background: #efefef; color: #37352f; }

        .page-title {
            font-size: clamp(22px, 5.5vw, 32px);
            font-weight: 700;
            letter-spacing: -0.02em;
            line-height: 1.3;
            margin-bottom: 16px;
            overflow-wrap: anywhere;
            word-break: keep-all;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: clamp(10px, 2.5vw, 16px);
            width: 100%;
        }

        @media (max-width: 720px) {
            .gallery { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        }

        .card {
            display: flex;
            flex-direction: column;
            min-width: 0;
            max-width: 100%;
            text-decoration: none;
            color: inherit;
            background: #fff;
            border: 1px solid #e9e9e7;
            border-radius: 10px;
            overflow: hidden;
            transition: background 0.15s ease, box-shadow 0.15s ease;
        }

        .card:hover {
            background: #f7f6f3;
            box-shadow: 0 2px 8px rgba(15, 15, 15, 0.06);
        }

        .card-cover {
            aspect-ratio: 16 / 10;
            border-bottom: 1px solid #e9e9e7;
            overflow: hidden;
            background: #f7f6f3;
            flex-shrink: 0;
        }

        .card-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .card-body {
            padding: 12px 14px 14px;
            min-width: 0;
        }

        .card-title {
            font-size: clamp(13px, 3.5vw, 14px);
            font-weight: 500;
            line-height: 1.45;
            color: #37352f;
            overflow-wrap: anywhere;
            word-break: keep-all;
        }
    </style>
</head>
<body>
    <main class="page">
        <a href="index.html" class="back-link">← 대문으로 돌아가기</a>
        <h1 class="page-title">🥕 똔그리의 재테크 한 스푼</h1>

        <div class="gallery" id="articleGallery"></div>
        <div class="gallery-controls" id="articleControls">
            <label class="gallery-search-wrap">
                <span class="gallery-search-icon" aria-hidden="true">🔍</span>
                <input type="search" id="articleSearch" class="gallery-search" placeholder="글 검색" autocomplete="off">
            </label>
            <div class="gallery-pager" id="articlePager"></div>
        </div>
    </main>

    <script src="articles-data.js"></script>
    <script src="gallery-list.js"></script>
    <script>
        loadGalleryFromJson('ttong', {
            pageSize: 8,
            gallery: '#articleGallery',
            search: '#articleSearch',
            pager: '#articlePager',
            controls: '#articleControls'
        });
    </script>
</body>
</html>
