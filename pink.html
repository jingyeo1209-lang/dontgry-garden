<!DOCTYPE html>
<html lang="ko">
<head>

        .notion-iframe { width: 100%; height: 600px; display: block; box-sizing: border-box; border: 3px solid #1a1a1a; border-radius: 8px; background: #fff; }
        .game-btn { font-family: 'DungGeunMo'; padding: 6px 12px; font-size: 12px; cursor: pointer; border: 2px solid #1a1a1a; background: #fff; border-radius: 6px; box-shadow: 2px 2px 0px #000; text-decoration: none; color: #000; display: inline-block; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="wrapper-card">
